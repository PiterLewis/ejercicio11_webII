# .github/workflows/deploy.yml
# El despliegue lo realiza la integración nativa de Railway con GitHub:
# al hacer push a main, Railway rebuilda y redespliega automáticamente.
# Este workflow NO lanza el deploy; solo hace un smoke test contra la URL
# pública una vez Railway ha terminado el despliegue (health check público).

name: Smoke test tras despliegue

on:
  workflow_run:
    workflows: ['CI/CD']
    branches: [main]
    types: [completed]

jobs:
  smoke-test:
    name: Comprobar /api/health en producción
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      # Se define como "Repository secret" en GitHub
      # (Settings, Secrets and variables, Actions, Secrets), con el
      # dominio público que Railway asigna al servicio en Settings, Networking.
      RAILWAY_URL: ${{ secrets.RAILWAY_URL }}

    steps:
      - name: Verificar que RAILWAY_URL está definida
        run: |
          if [ -z "${RAILWAY_URL}" ]; then
            echo "Falta la variable RAILWAY_URL en el repo (Settings, Variables)."
            echo "Debe contener la URL pública completa, por ejemplo:"
            echo "  https://biblioteca-api-production-ab12.up.railway.app"
            exit 1
          fi
          echo "URL objetivo: ${RAILWAY_URL}"

      - name: Esperar a que Railway termine el despliegue
        run: |
          echo "Dando tiempo a Railway para construir y publicar la nueva versión..."
          sleep 60

      - name: Smoke test contra /api/health
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            if curl -fsS "${RAILWAY_URL}/api/health"; then
              echo ""
              echo "Health OK"
              exit 0
            fi
            echo "Intento $i: la API aún no responde, reintentando en 15s..."
            sleep 15
          done
          echo "El health check falló tras 8 intentos (~2 minutos)."
          exit 1
