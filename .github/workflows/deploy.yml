# .github/workflows/deploy.yml — Despliegue a Railway tras un CI verde en main.
# Requiere el secret RAILWAY_TOKEN configurado en Settings → Secrets → Actions.

name: Deploy to Railway

on:
  workflow_run:
    workflows: ['CI/CD']
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Railway deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        id: deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service biblioteca-api --detach
          echo "url=https://biblioteca-api.up.railway.app" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS https://biblioteca-api.up.railway.app/api/health; then
              echo "Health OK"; exit 0
            fi
            echo "Esperando despliegue ($i/5)..."; sleep 15
          done
          echo "Health check falló tras 5 intentos"; exit 1
