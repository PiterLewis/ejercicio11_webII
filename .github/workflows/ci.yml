# .github/workflows/ci.yml — Pipeline CI/CD
# - test:   instala, valida prisma y ejecuta los Jest contra un Postgres efímero
# - docker: construye la imagen y la publica en GHCR (solo en push a main)

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Tests (Node ${{ matrix.node }} + Postgres)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: biblioteca
          POSTGRES_PASSWORD: biblioteca
          POSTGRES_DB: biblioteca_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U biblioteca -d biblioteca_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://biblioteca:biblioteca@localhost:5432/biblioteca_test?schema=public
      DIRECT_URL: postgresql://biblioteca:biblioteca@localhost:5432/biblioteca_test
      JWT_SECRET: test_secret_de_al_menos_32_caracteres_para_ci_pipeline
      JWT_EXPIRES_IN: 1h
      NODE_ENV: test
      LOG_LEVEL: warn

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Validar Prisma schema
        run: npx prisma validate

      - name: Aplicar migraciones (BD de test)
        run: npx prisma migrate deploy

      - name: Ejecutar tests
        run: npm test

  docker:
    name: Construir y publicar imagen Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Construir y publicar
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
